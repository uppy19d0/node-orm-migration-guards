name: Deploy to npm

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, test, and publish packages
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 15
    steps:
      - name: 1. Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: 2. Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: 3. Show workspace metadata
        run: node scripts/publish-workspaces.js --check

      - name: 4. Check SemVer policy
        run: npm run check:semver

      - name: 5. Check npm versions
        id: npm_versions
        run: node scripts/publish-workspaces.js --check --github-output "$GITHUB_OUTPUT"

      - name: 6. Install clean dependencies
        if: steps.npm_versions.outputs.unpublished_count != '0'
        run: npm ci --ignore-scripts

      - name: 7. Run tests
        if: steps.npm_versions.outputs.unpublished_count != '0'
        run: npm test

      - name: 8. Verify npm token
        if: steps.npm_versions.outputs.unpublished_count != '0'
        run: npm whoami --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 9. Preview npm package contents
        if: steps.npm_versions.outputs.unpublished_count != '0'
        run: npm pack --workspaces --dry-run

      - name: 10. Publish to npm
        if: steps.npm_versions.outputs.unpublished_count != '0'
        run: node scripts/publish-workspaces.js --publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 11. Verify published packages
        if: steps.npm_versions.outputs.unpublished_count != '0'
        run: node scripts/publish-workspaces.js --verify

      - name: 12. Write deploy summary
        if: always()
        run: |
          {
            echo "## npm Deploy Pipeline"
            echo ""
            echo "Unpublished packages before deploy: \`${{ steps.npm_versions.outputs.unpublished_count }}\`"
            echo ""
            if [ "${{ steps.npm_versions.outputs.unpublished_count }}" = "0" ]; then
              echo "Result: skipped because all workspace package versions already exist on npm."
            else
              echo "Result: publish attempted. Check the step status above for the final result."
            fi
          } >> "$GITHUB_STEP_SUMMARY"


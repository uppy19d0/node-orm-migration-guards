name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Validate packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 1. Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: 2. Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          package-manager-cache: false

      - name: 3. Show workspace metadata
        run: node scripts/publish-workspaces.js --check

      - name: 4. Check SemVer policy
        run: npm run check:semver

      - name: 5. Install clean dependencies
        run: npm ci --ignore-scripts

      - name: 6. Run tests
        run: npm test

      - name: 7. Preview npm packages
        run: npm pack --workspaces --dry-run

      - name: 8. Write pipeline summary
        if: always()
        run: |
          {
            echo "## CI Pipeline"
            echo ""
            echo "Job status: ${{ job.status }}"
            echo ""
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| Checkout source | see step log |"
            echo "| Set up Node.js 24 | see step log |"
            echo "| Check workspace metadata | see step log |"
            echo "| Check SemVer policy | see step log |"
            echo "| Install with npm ci | see step log |"
            echo "| Run tests | see step log |"
            echo "| Preview npm packages | see step log |"
          } >> "$GITHUB_STEP_SUMMARY"

